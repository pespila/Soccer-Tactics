<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: transparent; overflow: hidden; width: 100%; height: 100%; }
  canvas { display: block; width: 100%; cursor: grab; }
  canvas.dragging { cursor: grabbing; }
  canvas.crosshair { cursor: crosshair; }
</style>
</head>
<body>
<canvas id="board"></canvas>
<script>
/*__INIT_DATA__*/

(function() {
  var canvas = document.getElementById("board");
  var ctx = canvas.getContext("2d");

  var FL = 105, FW = 68, MARGIN = 6;

  // --- State ---
  var players = [];
  var ball = null;
  var arrows = [];
  var mode = "move";
  var homeColor = "#1e56a0";
  var awayColor = "#d32f2f";
  var stateVersion = -1;

  // Undo/redo stacks (JS-side)
  var undoStack = [];
  var redoStack = [];
  var MAX_UNDO = 50;

  // Interaction
  var dragging = null;
  var arrowStart = null;
  var arrowEnd = null;
  var selectedId = null;
  var selectedTeam = null;

  // Coordinate transforms
  var scale = 1, offsetX = 0, offsetY = 0;

  function fieldToCanvas(fx, fy) { return [offsetX + fx * scale, offsetY + fy * scale]; }
  function canvasToField(cx, cy) { return [(cx - offsetX) / scale, (cy - offsetY) / scale]; }
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  // --- localStorage persistence ---
  var STORAGE_KEY = "soccer_tactics_state";

  function saveToStorage() {
    try {
      var data = {
        players: players,
        ball: ball,
        arrows: arrows,
        stateVersion: stateVersion
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch(e) {}
  }

  function loadFromStorage() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      return JSON.parse(raw);
    } catch(e) { return null; }
  }

  // --- Undo/Redo ---
  function snapshot() {
    return JSON.stringify({ players: players, ball: ball, arrows: arrows });
  }

  function restoreSnapshot(s) {
    var d = JSON.parse(s);
    players = d.players;
    ball = d.ball;
    arrows = d.arrows;
  }

  function pushUndo() {
    undoStack.push(snapshot());
    if (undoStack.length > MAX_UNDO) undoStack.shift();
    redoStack = [];
  }

  function doUndo() {
    if (undoStack.length === 0) return;
    redoStack.push(snapshot());
    restoreSnapshot(undoStack.pop());
    saveToStorage();
    render();
  }

  function doRedo() {
    if (redoStack.length === 0) return;
    undoStack.push(snapshot());
    restoreSnapshot(redoStack.pop());
    saveToStorage();
    render();
  }

  // --- Init state from Python or localStorage ---
  function initState() {
    if (typeof INIT_DATA === "undefined") return;

    var stored = loadFromStorage();

    // If Python sent a new state version, use Python's data
    if (!stored || stored.stateVersion !== INIT_DATA.stateVersion) {
      players = INIT_DATA.players || [];
      ball = INIT_DATA.ball || null;
      arrows = INIT_DATA.arrows || [];
      stateVersion = INIT_DATA.stateVersion || 0;
      saveToStorage();
    } else {
      // Restore from localStorage
      players = stored.players || [];
      ball = stored.ball || null;
      arrows = stored.arrows || [];
      stateVersion = stored.stateVersion || 0;
    }

    // Always use latest mode/colors from Python
    mode = INIT_DATA.mode || "move";
    homeColor = INIT_DATA.homeColor || "#1e56a0";
    awayColor = INIT_DATA.awayColor || "#d32f2f";

    undoStack = [];
    redoStack = [];
  }

  // --- Resize ---
  function resize() {
    var parentW = canvas.parentElement ? canvas.parentElement.clientWidth : window.innerWidth;
    if (parentW < 100) parentW = window.innerWidth;
    var ratio = (FL + 2 * MARGIN) / (FW + 2 * MARGIN);

    // Fit within viewport height (leave small margin for Streamlit chrome)
    var maxH = window.innerHeight - 10;
    var wFromHeight = maxH * ratio;

    // Use the smaller dimension to ensure it fits both width and height
    var w = Math.min(parentW, wFromHeight);
    var h = w / ratio;

    canvas.width = w * window.devicePixelRatio;
    canvas.height = h * window.devicePixelRatio;
    canvas.style.width = w + "px";
    canvas.style.height = h + "px";
    ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
    scale = w / (FL + 2 * MARGIN);
    offsetX = MARGIN * scale;
    offsetY = MARGIN * scale;

    // Resize the parent iframe to fit the canvas exactly
    try {
      if (window.frameElement) {
        window.frameElement.style.height = (h + 2) + "px";
      }
    } catch(e) {}

    return h;
  }

  // --- Drawing ---
  function drawField() {
    var w = canvas.width / window.devicePixelRatio;
    var h = canvas.height / window.devicePixelRatio;
    ctx.fillStyle = "#2d8c3c";
    ctx.fillRect(0, 0, w, h);
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 2;

    sRect(0, 0, FL, FW);
    fLine(FL/2, 0, FL/2, FW);
    fCircle(FL/2, FW/2, 9.15);
    fFill(FL/2, FW/2, 0.3, "#ffffff");

    sRect(0, (FW-40.32)/2, 16.5, 40.32);
    sRect(FL-16.5, (FW-40.32)/2, 16.5, 40.32);
    sRect(0, (FW-18.32)/2, 5.5, 18.32);
    sRect(FL-5.5, (FW-18.32)/2, 5.5, 18.32);

    fFill(11, FW/2, 0.3, "#ffffff");
    fFill(FL-11, FW/2, 0.3, "#ffffff");

    fArc(11, FW/2, 9.15, -0.93, 0.93);
    fArc(FL-11, FW/2, 9.15, Math.PI-0.93, Math.PI+0.93);

    fArc(0, 0, 1, 0, Math.PI/2);
    fArc(FL, 0, 1, Math.PI/2, Math.PI);
    fArc(FL, FW, 1, Math.PI, 3*Math.PI/2);
    fArc(0, FW, 1, 3*Math.PI/2, 2*Math.PI);

    ctx.strokeStyle = "#cccccc";
    ctx.lineWidth = 3;
    sRect(-2.44, (FW-7.32)/2, 2.44, 7.32);
    sRect(FL, (FW-7.32)/2, 2.44, 7.32);
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 2;
  }

  function sRect(fx,fy,fw,fh) { var p=fieldToCanvas(fx,fy); ctx.strokeRect(p[0],p[1],fw*scale,fh*scale); }
  function fLine(x1,y1,x2,y2) { var a=fieldToCanvas(x1,y1),b=fieldToCanvas(x2,y2); ctx.beginPath();ctx.moveTo(a[0],a[1]);ctx.lineTo(b[0],b[1]);ctx.stroke(); }
  function fCircle(fx,fy,fr) { var p=fieldToCanvas(fx,fy);ctx.beginPath();ctx.arc(p[0],p[1],fr*scale,0,2*Math.PI);ctx.stroke(); }
  function fFill(fx,fy,fr,c) { var p=fieldToCanvas(fx,fy);ctx.beginPath();ctx.arc(p[0],p[1],fr*scale,0,2*Math.PI);ctx.fillStyle=c;ctx.fill(); }
  function fArc(fx,fy,fr,sa,ea) { var p=fieldToCanvas(fx,fy);ctx.beginPath();ctx.arc(p[0],p[1],fr*scale,sa,ea);ctx.stroke(); }

  function drawPlayers() {
    var r = 2.0 * scale;
    var fs = Math.max(10, Math.round(1.6 * scale));
    for (var i = 0; i < players.length; i++) {
      var p = players[i];
      var cp = fieldToCanvas(p.x, p.y);
      var color = p.team === "home" ? homeColor : awayColor;

      if (p.id === selectedId && p.team === selectedTeam) {
        ctx.beginPath(); ctx.arc(cp[0],cp[1],r+4,0,2*Math.PI);
        ctx.strokeStyle="#ffeb3b"; ctx.lineWidth=3; ctx.stroke();
      }
      ctx.beginPath(); ctx.arc(cp[0],cp[1],r,0,2*Math.PI);
      ctx.fillStyle=color; ctx.fill();
      ctx.strokeStyle="#ffffff"; ctx.lineWidth=2; ctx.stroke();
      ctx.fillStyle="#ffffff"; ctx.font="bold "+fs+"px sans-serif";
      ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText(String(p.number), cp[0], cp[1]+1);
    }
  }

  function drawBall() {
    if (!ball) return;
    var cp = fieldToCanvas(ball.x, ball.y);
    var r = 1.4 * scale;
    ctx.beginPath(); ctx.arc(cp[0]+1,cp[1]+1,r,0,2*Math.PI);
    ctx.fillStyle="rgba(0,0,0,0.3)"; ctx.fill();
    ctx.beginPath(); ctx.arc(cp[0],cp[1],r,0,2*Math.PI);
    ctx.fillStyle="#ffffff"; ctx.fill();
    ctx.strokeStyle="#000000"; ctx.lineWidth=2; ctx.stroke();
    ctx.beginPath(); ctx.arc(cp[0],cp[1],r*0.4,0,2*Math.PI);
    ctx.fillStyle="#000000"; ctx.fill();
  }

  function drawArrows() {
    for (var i = 0; i < arrows.length; i++) {
      var a = arrows[i];
      drawArrowLine(a.start_x, a.start_y, a.end_x, a.end_y, a.color||"#ffeb3b");
    }
    if (arrowStart && arrowEnd) {
      drawArrowLine(arrowStart[0], arrowStart[1], arrowEnd[0], arrowEnd[1], "#ffeb3b");
    }
  }

  function drawArrowLine(fx1,fy1,fx2,fy2,color) {
    var p1=fieldToCanvas(fx1,fy1), p2=fieldToCanvas(fx2,fy2);
    var hl=12, angle=Math.atan2(p2[1]-p1[1],p2[0]-p1[0]);
    ctx.strokeStyle=color; ctx.fillStyle=color; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(p1[0],p1[1]); ctx.lineTo(p2[0],p2[1]); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p2[0],p2[1]);
    ctx.lineTo(p2[0]-hl*Math.cos(angle-Math.PI/6), p2[1]-hl*Math.sin(angle-Math.PI/6));
    ctx.lineTo(p2[0]-hl*Math.cos(angle+Math.PI/6), p2[1]-hl*Math.sin(angle+Math.PI/6));
    ctx.closePath(); ctx.fill();
  }

  function render() {
    var h = resize();
    drawField();
    drawArrows();
    drawPlayers();
    drawBall();
    return h;
  }

  // --- Hit testing ---
  function hitTest(cx, cy) {
    var f = canvasToField(cx, cy), fx = f[0], fy = f[1], hitR = 3.0;
    if (ball) {
      var dx = fx-ball.x, dy = fy-ball.y;
      if (dx*dx+dy*dy < hitR*hitR) return { type:"ball", obj:ball };
    }
    for (var i = players.length-1; i >= 0; i--) {
      var p = players[i], dx2 = fx-p.x, dy2 = fy-p.y;
      if (dx2*dx2+dy2*dy2 < hitR*hitR) return { type:"player", obj:p };
    }
    return null;
  }

  // --- Event handlers ---
  function getPos(e) {
    var rect = canvas.getBoundingClientRect();
    if (e.touches && e.touches.length > 0) return [e.touches[0].clientX-rect.left, e.touches[0].clientY-rect.top];
    return [e.clientX-rect.left, e.clientY-rect.top];
  }

  function onDown(e) {
    e.preventDefault();
    var pos = getPos(e), cx = pos[0], cy = pos[1];

    if (mode === "arrow") {
      canvas.classList.add("crosshair");
      var f = canvasToField(cx, cy);
      arrowStart = [clamp(f[0],0,FL), clamp(f[1],0,FW)];
      arrowEnd = arrowStart.slice();
      return;
    }

    var hit = hitTest(cx, cy);
    if (hit) {
      pushUndo();
      dragging = hit.obj;
      if (hit.type === "player") { selectedId = hit.obj.id; selectedTeam = hit.obj.team; }
      canvas.classList.add("dragging");
    } else {
      selectedId = null; selectedTeam = null;
    }
    render();
  }

  function onMove(e) {
    e.preventDefault();
    var pos = getPos(e), f = canvasToField(pos[0], pos[1]);

    if (mode === "arrow" && arrowStart) {
      arrowEnd = [clamp(f[0],0,FL), clamp(f[1],0,FW)];
      render(); return;
    }
    if (dragging) {
      dragging.x = clamp(f[0],0,FL);
      dragging.y = clamp(f[1],0,FW);
      render();
    }
  }

  function onUp(e) {
    e.preventDefault();
    canvas.classList.remove("dragging");
    canvas.classList.remove("crosshair");

    if (mode === "arrow" && arrowStart && arrowEnd) {
      var dx = arrowEnd[0]-arrowStart[0], dy = arrowEnd[1]-arrowStart[1];
      if (dx*dx+dy*dy > 4) {
        pushUndo();
        arrows.push({ start_x:arrowStart[0], start_y:arrowStart[1], end_x:arrowEnd[0], end_y:arrowEnd[1], color:"#ffeb3b" });
      }
      arrowStart = null; arrowEnd = null;
      saveToStorage(); render(); return;
    }
    if (dragging) {
      dragging = null;
      saveToStorage(); render();
    }
  }

  canvas.addEventListener("mousedown", onDown);
  canvas.addEventListener("mousemove", onMove);
  canvas.addEventListener("mouseup", onUp);
  canvas.addEventListener("mouseleave", onUp);
  canvas.addEventListener("touchstart", onDown, {passive:false});
  canvas.addEventListener("touchmove", onMove, {passive:false});
  canvas.addEventListener("touchend", onUp, {passive:false});

  // --- Keyboard shortcuts ---
  window.addEventListener("keydown", function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === "z") {
      e.preventDefault();
      if (e.shiftKey) doRedo(); else doUndo();
    }
  });

  // --- Listen for commands from parent (sidebar buttons) ---
  window.addEventListener("message", function(e) {
    if (!e.data || !e.data.type) return;
    if (e.data.type === "undo") doUndo();
    if (e.data.type === "redo") doRedo();
    if (e.data.type === "clearArrows") {
      if (arrows.length > 0) { pushUndo(); arrows = []; saveToStorage(); render(); }
    }
    if (e.data.type === "save") {
      var json = JSON.stringify({ players:players, ball:ball, arrows:arrows }, null, 2);
      var blob = new Blob([json], {type:"application/json"});
      var a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "tactic.json";
      a.click();
      URL.revokeObjectURL(a.href);
    }
    if (e.data.type === "exportPng") {
      var dataUrl = canvas.toDataURL("image/png");
      var a2 = document.createElement("a");
      a2.href = dataUrl;
      a2.download = "tactic.png";
      a2.click();
    }
  });

  // --- Start ---
  initState();
  render();
})();
</script>
</body>
</html>
