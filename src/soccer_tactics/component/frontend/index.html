<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soccer Tactics Board</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: transparent; overflow: hidden; width: 100%; }
  canvas {
    display: block;
    width: 100%;
    cursor: grab;
  }
  canvas.dragging { cursor: grabbing; }
  canvas.crosshair { cursor: crosshair; }
</style>
</head>
<body>
<canvas id="board"></canvas>

<script>
// ---- Streamlit Component Communication Layer (reactless) ----
(function() {
  var Streamlit = {};

  // Event emitter
  var listeners = {};
  Streamlit.events = {
    addEventListener: function(type, fn) {
      if (!listeners[type]) listeners[type] = [];
      listeners[type].push(fn);
    }
  };
  function emit(type, detail) {
    var fns = listeners[type] || [];
    for (var i = 0; i < fns.length; i++) {
      fns[i]({ detail: detail });
    }
  }

  Streamlit.RENDER_EVENT = "streamlit:render";

  Streamlit.setComponentReady = function() {
    window.parent.postMessage({ type: "streamlit:componentReady", apiVersion: 1 }, "*");
  };

  Streamlit.setComponentValue = function(value) {
    window.parent.postMessage({ type: "streamlit:setComponentValue", value: value }, "*");
  };

  Streamlit.setFrameHeight = function(height) {
    window.parent.postMessage({ type: "streamlit:setFrameHeight", height: height }, "*");
  };

  // Listen for render messages from Streamlit
  window.addEventListener("message", function(event) {
    if (!event.data) return;
    if (event.data.type === "streamlit:render") {
      emit(Streamlit.RENDER_EVENT, { args: event.data.args, disabled: event.data.disabled, theme: event.data.theme });
    }
  });

  window.Streamlit = Streamlit;
})();
</script>

<script>
(function() {
  var canvas = document.getElementById("board");
  var ctx = canvas.getContext("2d");

  // Field dimensions in meters
  var FL = 105, FW = 68;
  var MARGIN = 6;

  // State
  var players = [];
  var ball = null;
  var arrows = [];
  var mode = "move";
  var homeColor = "#1e56a0";
  var awayColor = "#d32f2f";

  // Interaction state
  var dragging = null;
  var dragType = null;
  var arrowStart = null;
  var arrowEnd = null;
  var selectedId = null;
  var selectedTeam = null;
  var pngRequested = false;

  // Coordinate transforms
  var scale = 1;
  var offsetX = 0, offsetY = 0;

  function fieldToCanvas(fx, fy) {
    return [offsetX + fx * scale, offsetY + fy * scale];
  }

  function canvasToField(cx, cy) {
    return [(cx - offsetX) / scale, (cy - offsetY) / scale];
  }

  function resize() {
    var parent = canvas.parentElement;
    var w = parent ? parent.clientWidth : window.innerWidth;
    if (w < 100) w = window.innerWidth;
    var ratio = (FL + 2 * MARGIN) / (FW + 2 * MARGIN);
    var h = w / ratio;
    canvas.width = w * window.devicePixelRatio;
    canvas.height = h * window.devicePixelRatio;
    canvas.style.height = h + "px";
    ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
    scale = w / (FL + 2 * MARGIN);
    offsetX = MARGIN * scale;
    offsetY = MARGIN * scale;
    return h;
  }

  // ---------- DRAWING ----------

  function drawField() {
    var w = canvas.width / window.devicePixelRatio;
    var h = canvas.height / window.devicePixelRatio;

    ctx.fillStyle = "#2d8c3c";
    ctx.fillRect(0, 0, w, h);

    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 2;

    // Boundary
    fieldStrokeRect(0, 0, FL, FW);

    // Halfway line
    fieldLine(FL / 2, 0, FL / 2, FW);

    // Center circle
    fieldCircle(FL / 2, FW / 2, 9.15);

    // Center spot
    fieldFillCircle(FL / 2, FW / 2, 0.3, "#ffffff");

    // Penalty areas
    fieldStrokeRect(0, (FW - 40.32) / 2, 16.5, 40.32);
    fieldStrokeRect(FL - 16.5, (FW - 40.32) / 2, 16.5, 40.32);

    // Goal areas
    fieldStrokeRect(0, (FW - 18.32) / 2, 5.5, 18.32);
    fieldStrokeRect(FL - 5.5, (FW - 18.32) / 2, 5.5, 18.32);

    // Penalty spots
    fieldFillCircle(11, FW / 2, 0.3, "#ffffff");
    fieldFillCircle(FL - 11, FW / 2, 0.3, "#ffffff");

    // Penalty arcs
    fieldArc(11, FW / 2, 9.15, -0.93, 0.93);
    fieldArc(FL - 11, FW / 2, 9.15, Math.PI - 0.93, Math.PI + 0.93);

    // Corner arcs
    fieldArc(0, 0, 1, 0, Math.PI / 2);
    fieldArc(FL, 0, 1, Math.PI / 2, Math.PI);
    fieldArc(FL, FW, 1, Math.PI, 3 * Math.PI / 2);
    fieldArc(0, FW, 1, 3 * Math.PI / 2, 2 * Math.PI);

    // Goals
    ctx.strokeStyle = "#cccccc";
    ctx.lineWidth = 3;
    fieldStrokeRect(-2.44, (FW - 7.32) / 2, 2.44, 7.32);
    fieldStrokeRect(FL, (FW - 7.32) / 2, 2.44, 7.32);
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 2;
  }

  function fieldStrokeRect(fx, fy, fw, fh) {
    var p = fieldToCanvas(fx, fy);
    ctx.strokeRect(p[0], p[1], fw * scale, fh * scale);
  }

  function fieldLine(fx1, fy1, fx2, fy2) {
    var p1 = fieldToCanvas(fx1, fy1);
    var p2 = fieldToCanvas(fx2, fy2);
    ctx.beginPath();
    ctx.moveTo(p1[0], p1[1]);
    ctx.lineTo(p2[0], p2[1]);
    ctx.stroke();
  }

  function fieldCircle(fx, fy, fr) {
    var p = fieldToCanvas(fx, fy);
    ctx.beginPath();
    ctx.arc(p[0], p[1], fr * scale, 0, 2 * Math.PI);
    ctx.stroke();
  }

  function fieldFillCircle(fx, fy, fr, color) {
    var p = fieldToCanvas(fx, fy);
    ctx.beginPath();
    ctx.arc(p[0], p[1], fr * scale, 0, 2 * Math.PI);
    ctx.fillStyle = color;
    ctx.fill();
  }

  function fieldArc(fx, fy, fr, startAngle, endAngle) {
    var p = fieldToCanvas(fx, fy);
    ctx.beginPath();
    ctx.arc(p[0], p[1], fr * scale, startAngle, endAngle);
    ctx.stroke();
  }

  function drawPlayers() {
    var r = 2.0 * scale;
    var fontSize = Math.max(10, Math.round(1.6 * scale));

    for (var i = 0; i < players.length; i++) {
      var p = players[i];
      var cp = fieldToCanvas(p.x, p.y);
      var color = p.team === "home" ? homeColor : awayColor;

      // Selection glow
      if (p.id === selectedId && p.team === selectedTeam) {
        ctx.beginPath();
        ctx.arc(cp[0], cp[1], r + 4, 0, 2 * Math.PI);
        ctx.strokeStyle = "#ffeb3b";
        ctx.lineWidth = 3;
        ctx.stroke();
      }

      // Player circle
      ctx.beginPath();
      ctx.arc(cp[0], cp[1], r, 0, 2 * Math.PI);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 2;
      ctx.stroke();

      // Jersey number
      ctx.fillStyle = "#ffffff";
      ctx.font = "bold " + fontSize + "px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(String(p.number), cp[0], cp[1] + 1);
    }
  }

  function drawBall() {
    if (!ball) return;
    var cp = fieldToCanvas(ball.x, ball.y);
    var r = 1.4 * scale;

    // Shadow
    ctx.beginPath();
    ctx.arc(cp[0] + 1, cp[1] + 1, r, 0, 2 * Math.PI);
    ctx.fillStyle = "rgba(0,0,0,0.3)";
    ctx.fill();

    // Ball
    ctx.beginPath();
    ctx.arc(cp[0], cp[1], r, 0, 2 * Math.PI);
    ctx.fillStyle = "#ffffff";
    ctx.fill();
    ctx.strokeStyle = "#000000";
    ctx.lineWidth = 2;
    ctx.stroke();

    // Pentagon hint
    ctx.beginPath();
    ctx.arc(cp[0], cp[1], r * 0.4, 0, 2 * Math.PI);
    ctx.fillStyle = "#000000";
    ctx.fill();
  }

  function drawArrows() {
    for (var i = 0; i < arrows.length; i++) {
      var a = arrows[i];
      drawArrowLine(a.start_x, a.start_y, a.end_x, a.end_y, a.color || "#ffeb3b");
    }
    if (arrowStart && arrowEnd) {
      drawArrowLine(arrowStart[0], arrowStart[1], arrowEnd[0], arrowEnd[1], "#ffeb3b");
    }
  }

  function drawArrowLine(fx1, fy1, fx2, fy2, color) {
    var p1 = fieldToCanvas(fx1, fy1);
    var p2 = fieldToCanvas(fx2, fy2);
    var headLen = 12;
    var angle = Math.atan2(p2[1] - p1[1], p2[0] - p1[0]);

    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.lineWidth = 3;

    ctx.beginPath();
    ctx.moveTo(p1[0], p1[1]);
    ctx.lineTo(p2[0], p2[1]);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(p2[0], p2[1]);
    ctx.lineTo(p2[0] - headLen * Math.cos(angle - Math.PI / 6), p2[1] - headLen * Math.sin(angle - Math.PI / 6));
    ctx.lineTo(p2[0] - headLen * Math.cos(angle + Math.PI / 6), p2[1] - headLen * Math.sin(angle + Math.PI / 6));
    ctx.closePath();
    ctx.fill();
  }

  function render() {
    var h = resize();
    drawField();
    drawArrows();
    drawPlayers();
    drawBall();
    return h;
  }

  // ---------- HIT TESTING ----------

  function hitTest(cx, cy) {
    var f = canvasToField(cx, cy);
    var fx = f[0], fy = f[1];
    var hitR = 3.0;

    if (ball) {
      var dx = fx - ball.x, dy = fy - ball.y;
      if (dx * dx + dy * dy < hitR * hitR) {
        return { type: "ball", obj: ball };
      }
    }

    for (var i = players.length - 1; i >= 0; i--) {
      var p = players[i];
      var dx2 = fx - p.x, dy2 = fy - p.y;
      if (dx2 * dx2 + dy2 * dy2 < hitR * hitR) {
        return { type: "player", obj: p, index: i };
      }
    }

    return null;
  }

  function clamp(val, lo, hi) {
    return Math.max(lo, Math.min(hi, val));
  }

  // ---------- EVENT HANDLERS ----------

  function getPos(e) {
    var rect = canvas.getBoundingClientRect();
    if (e.touches && e.touches.length > 0) {
      return [e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top];
    }
    return [e.clientX - rect.left, e.clientY - rect.top];
  }

  function onDown(e) {
    e.preventDefault();
    var pos = getPos(e);
    var cx = pos[0], cy = pos[1];

    if (mode === "arrow") {
      canvas.classList.add("crosshair");
      var f = canvasToField(cx, cy);
      arrowStart = [clamp(f[0], 0, FL), clamp(f[1], 0, FW)];
      arrowEnd = arrowStart.slice();
      return;
    }

    var hit = hitTest(cx, cy);
    if (hit) {
      dragging = hit.obj;
      dragType = hit.type;
      if (hit.type === "player") {
        selectedId = hit.obj.id;
        selectedTeam = hit.obj.team;
      }
      canvas.classList.add("dragging");
    } else {
      selectedId = null;
      selectedTeam = null;
    }
    render();
  }

  function onMove(e) {
    e.preventDefault();
    var pos = getPos(e);
    var f = canvasToField(pos[0], pos[1]);
    var fx = f[0], fy = f[1];

    if (mode === "arrow" && arrowStart) {
      arrowEnd = [clamp(fx, 0, FL), clamp(fy, 0, FW)];
      render();
      return;
    }

    if (dragging) {
      dragging.x = clamp(fx, 0, FL);
      dragging.y = clamp(fy, 0, FW);
      render();
    }
  }

  function onUp(e) {
    e.preventDefault();
    canvas.classList.remove("dragging");
    canvas.classList.remove("crosshair");

    if (mode === "arrow" && arrowStart && arrowEnd) {
      var dx = arrowEnd[0] - arrowStart[0];
      var dy = arrowEnd[1] - arrowStart[1];
      if (dx * dx + dy * dy > 4) {
        arrows.push({
          start_x: arrowStart[0], start_y: arrowStart[1],
          end_x: arrowEnd[0], end_y: arrowEnd[1],
          color: "#ffeb3b"
        });
      }
      arrowStart = null;
      arrowEnd = null;
      render();
      sendState();
      return;
    }

    if (dragging) {
      dragging = null;
      dragType = null;
      render();
      sendState();
    }
  }

  canvas.addEventListener("mousedown", onDown);
  canvas.addEventListener("mousemove", onMove);
  canvas.addEventListener("mouseup", onUp);
  canvas.addEventListener("mouseleave", onUp);
  canvas.addEventListener("touchstart", onDown, { passive: false });
  canvas.addEventListener("touchmove", onMove, { passive: false });
  canvas.addEventListener("touchend", onUp, { passive: false });

  // ---------- STREAMLIT COMMUNICATION ----------

  function sendState() {
    var value = {
      players: players.map(function(p) {
        return { id: p.id, number: p.number, name: p.name || "", x: p.x, y: p.y, team: p.team };
      }),
      ball: { id: ball.id, number: ball.number, name: ball.name || "", x: ball.x, y: ball.y, team: ball.team },
      arrows: arrows.map(function(a) {
        return { start_x: a.start_x, start_y: a.start_y, end_x: a.end_x, end_y: a.end_y, color: a.color };
      })
    };

    if (pngRequested) {
      value.png = canvas.toDataURL("image/png");
      pngRequested = false;
    }

    window.Streamlit.setComponentValue(value);
  }

  function onRender(event) {
    var args = event.detail.args;

    if (args.players) {
      players = args.players;
    }
    if (args.ball) {
      ball = args.ball;
    }
    if (args.arrows !== undefined) {
      arrows = args.arrows;
    }
    if (args.mode) {
      mode = args.mode;
      if (mode === "arrow") {
        canvas.classList.add("crosshair");
      } else {
        canvas.classList.remove("crosshair");
      }
    }
    if (args.homeColor) {
      homeColor = args.homeColor;
    }
    if (args.awayColor) {
      awayColor = args.awayColor;
    }
    if (args.exportPng) {
      pngRequested = true;
      render();
      sendState();
      return;
    }

    var h = render();
    window.Streamlit.setFrameHeight(h);
  }

  window.Streamlit.events.addEventListener(window.Streamlit.RENDER_EVENT, onRender);
  window.Streamlit.setComponentReady();
})();
</script>
</body>
</html>
